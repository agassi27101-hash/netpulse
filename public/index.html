<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws: http:; img-src 'self' data:;">
  <title>NetPulse – Network Monitor</title>
  <link rel="stylesheet" href="/css/style.css?v=2">
  <!-- Google Fonts: IBM Plex Sans + Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark pulse-dot status-up"></div>
        <div class="brand-name">Net<span>Pulse</span></div>
      </div>

      <nav class="nav">
        <a href="#/overview" class="nav-link" data-view="overview">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          <span class="nav-label">Overview</span>
        </a>
        <a href="#/devices" class="nav-link" data-view="devices">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
          <span class="nav-label">Devices</span>
        </a>
        <a href="#/metrics" class="nav-link" data-view="metrics">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
          <span class="nav-label">Metrics</span>
        </a>
        <a href="#/alerts" class="nav-link" data-view="alerts">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <span class="nav-label">Alerts</span>
        </a>
        <a href="#/settings" class="nav-link" data-view="settings">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="connection-indicator">
          <span class="conn-dot" id="connectionDot"></span>
          <span class="connection-label" id="connectionLabel">Offline</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-col">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="header-logo">
            <svg class="header-logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </div>
          <div class="header-titles">
            <h1 class="page-title" id="pageTitle">Network Monitor</h1>
            <div class="header-subtitle">
              <span class="status-indicator-dot"></span>
              Live &bull; Real-time monitoring
            </div>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="time-container">
            <span class="time-label">System Time</span>
            <span class="topbar-time" id="topbarTime"></span>
          </div>
        </div>
      </header>

      <!-- View Container -->
      <main class="view-container" id="viewContainer">
        <div class="loading">Loading...</div>
      </main>
    </div>
  </div>

  <!-- Local Vendor Scripts -->
  <script src="/js/vendor/socket.io.js"></script>
  <script src="/js/vendor/chart.umd.min.js"></script>
  <script src="/js/vendor/vis-network.min.js"></script>

  <!-- Local Modules (type=module) -->
  <script type="module" src="/js/main.js?v=3"></script>
</body>
</html>
